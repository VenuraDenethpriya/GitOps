name: Build and Push Backend

# This tells GitHub to run this script ONLY when code is pushed to the main branch
on:
  push:
    branches:
      - main
    # This ensures it only runs if you changed something in the backend folder
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Grabs your code from the repository
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Logs into Docker Hub using the secrets you just saved
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Builds the image from your backend folder and pushes it
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # This tags the image with your username and names it 'gitops-backend'
          tags: ${{ secrets.DOCKER_USERNAME }}/gitops-backend:latest