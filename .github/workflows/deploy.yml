name: Backend GitOps Pipeline Fixed

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    
    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build and Push Docker Image
        run: |
          docker build -t venuradenethpriya/backend:$IMAGE_TAG ./backend

      - name: Update Kubernetes Manifest for ArgoCD
        run: |
          sed -i "s|venuradenethpriya/backend:.*|venuradenethpriya/backend:$IMAGE_TAG|g" backend/backend.yaml
          
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git commit -am "Update backend image to $IMAGE_TAG"
          git push
