apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-backend
  template:
    metadata:
      labels:
        app: gitops-backend
  spec:
    containers:
    - name: backend
      image: venuradenethpriya/gitops-backend:latest
      ports:
      - containerPort: 5000
      resources:
        limits:
          memory: "256Mi"
          cpu: "500m"
        requests:
          memory: "128Mi"
          cpu: "250m"